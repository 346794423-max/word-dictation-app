<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>英语听写 · 小学PEP</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg"/>
  <style>
    :root {
      --primary:#3b82f6; --purple:#6d28d9; --success:#16a34a;
      --warning:#d97706; --danger:#dc2626;
      --bg:#f1f5f9; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; --r:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .screen{display:none;min-height:100vh;flex-direction:column}
    .screen.active{display:flex}
    .hd{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;padding:18px 16px 22px;border-radius:0 0 20px 20px;position:relative;text-align:center;flex-shrink:0}
    .hd h1{font-size:20px;font-weight:700;margin-bottom:2px}
    .hd p{font-size:13px;opacity:.85}
    .back-btn{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.22);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    /* HOME */
    #homeScreen .hero{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;text-align:center;padding:36px 20px 44px;border-radius:0 0 28px 28px}
    .hero-icon{font-size:56px;margin-bottom:10px}
    .hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
    .hero p{font-size:13px;opacity:.88;line-height:1.7}
    .home-body{padding:16px;flex:1;overflow-y:auto}
    .daily-banner{background:linear-gradient(135deg,#fef3c7,#fffbeb);border:1.5px solid #fcd34d;border-radius:var(--r);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer}
    .daily-banner .db-icon{font-size:30px}
    .daily-banner .db-info h3{font-size:15px;font-weight:700;color:#92400e}
    .daily-banner .db-info p{font-size:12px;color:#b45309;margin-top:2px}
    .daily-banner .db-arrow{margin-left:auto;font-size:20px;color:#b45309}
    .mistake-banner{background:linear-gradient(135deg,#fee2e2,#fff5f5);border:1.5px solid #fca5a5;border-radius:var(--r);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer}
    .mistake-banner .mb-icon{font-size:30px}
    .mistake-banner .mb-info h3{font-size:15px;font-weight:700;color:#991b1b}
    .mistake-banner .mb-info p{font-size:12px;color:#b91c1c;margin-top:2px}
    .mistake-banner .mb-arrow{margin-left:auto;font-size:20px;color:#b91c1c}
    .badge{background:#dc2626;color:#fff;font-size:11px;font-weight:700;border-radius:100px;padding:2px 7px;margin-left:6px}
    .sec-title{font-size:15px;font-weight:700;margin-bottom:10px}
    .tabs{display:flex;gap:8px;margin-bottom:12px}
    .tab-btn{flex:1;padding:9px 6px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;text-align:center}
    .tab-btn.on{border-color:var(--primary);background:#eff6ff;color:var(--primary)}
    .unit-list{display:flex;flex-direction:column;gap:8px}
    .unit-card{background:#fff;border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s}
    .unit-card:active{transform:scale(.98)}
    .unit-card:hover{border-color:var(--primary)}
    .unit-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .unit-info{flex:1}
    .unit-info h3{font-size:14px;font-weight:700;margin-bottom:2px}
    .unit-info p{font-size:11px;color:var(--muted)}
    .unit-arrow{color:var(--muted);font-size:20px}
    .grade-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:100px;margin-left:4px}
    .g3{background:#dbeafe;color:#1d4ed8}.g4{background:#d1fae5;color:#065f46}.g5{background:#ede9fe;color:#5b21b6}.g0{background:#fef3c7;color:#92400e}
    /* SETUP */
    #setupScreen .body{padding:14px;flex:1;overflow-y:auto}
    .setup-card{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .setup-card h3{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
    .pill-row{display:flex;gap:8px;flex-wrap:wrap}
    .pill{padding:7px 13px;border-radius:100px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
    .pill.on{border-color:var(--primary);background:#eff6ff;color:var(--primary)}
    .range-row{display:flex;align-items:center;gap:12px}
    .range-row input[type=range]{flex:1;accent-color:var(--primary)}
    .range-val{font-size:16px;font-weight:800;color:var(--primary);min-width:30px;text-align:right}
    .interval-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
    .toggle-row{display:flex;gap:8px}
    .toggle-btn{flex:1;padding:9px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;text-align:center}
    .toggle-btn.on{border-color:var(--primary);background:#eff6ff;color:var(--primary)}
    .start-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;border:none;border-radius:var(--r);font-size:17px;font-weight:700;cursor:pointer;letter-spacing:.5px;margin-top:4px}
    /* DICTATION */
    #dictScreen .body{padding:12px;flex:1;display:flex;flex-direction:column;gap:10px}
    .prog-row{display:flex;justify-content:space-between;align-items:center}
    .prog-text{font-size:13px;color:var(--muted);font-weight:600}
    .prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--purple));border-radius:3px;transition:width .4s}
    .display-card{background:#fff;border-radius:20px;padding:26px 20px 22px;box-shadow:0 4px 20px rgba(59,130,246,.13);text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .item-type-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:8px;display:inline-block}
    .type-word{background:#dbeafe;color:#1d4ed8}
    .type-phrase{background:#d1fae5;color:#065f46}
    .type-sentence{background:#ede9fe;color:#5b21b6}
    .type-mistake{background:#fee2e2;color:#991b1b}
    .word-num{font-size:13px;color:var(--muted);margin-bottom:6px}
    .word-cn{font-size:28px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:8px}
    .word-en{font-size:13px;font-weight:600;color:var(--muted);min-height:20px}
    .speaking-badge{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;color:var(--primary);border-radius:100px;padding:6px 14px;font-size:13px;font-weight:600;margin-top:10px}
    .dot{width:8px;height:8px;background:var(--primary);border-radius:50%;animation:blink 1s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
    .status-line{font-size:13px;color:var(--muted);text-align:center;min-height:20px;font-weight:500}
    .ctrl-bar{display:grid;grid-template-columns:1fr 1.6fr 1fr;gap:8px}
    .ctrl-btn{padding:12px 6px;border-radius:var(--r);border:none;font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .1s}
    .ctrl-btn:active{transform:scale(.95)}
    .ctrl-btn .icon{font-size:20px}
    .btn-repeat{background:#eff6ff;color:var(--primary)}
    .btn-pause{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff}
    .btn-skip{background:#f1f5f9;color:var(--muted)}
    .btn-stop{background:#fee2e2;color:var(--danger)}
    .btn-finish{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
    /* ANSWER SHEET */
    #answerScreen .body{padding:14px;flex:1;overflow-y:auto}
    .ans-summary{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;text-align:center}
    .ans-summary>div{flex:1}
    .ans-num{font-size:26px;font-weight:800}
    .ans-lbl{font-size:11px;color:var(--muted);margin-top:3px}
    .n-green{color:var(--success)}.n-blue{color:var(--primary)}.n-red{color:var(--danger)}
    .ans-list{display:flex;flex-direction:column;gap:0;margin-bottom:14px;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .ans-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
    .ans-item:last-child{border-bottom:none}
    .ans-n{font-size:12px;color:var(--muted);width:20px;flex-shrink:0;text-align:center;font-weight:700}
    .ans-cn{font-size:12px;color:var(--muted);margin-bottom:2px}
    .ans-en{font-size:16px;font-weight:800;color:var(--text)}
    .ans-speak{background:#eff6ff;border:none;color:var(--primary);width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .mark-btn{background:#fee2e2;border:none;color:var(--danger);width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .mark-btn.marked{background:var(--danger);color:#fff}
    .bottom-btns{display:flex;flex-direction:column;gap:10px;padding-bottom:24px}
    .btn-primary{padding:14px;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}
    .btn-outline{padding:12px;background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer}
    .btn-warning{padding:12px;background:#fff;color:var(--warning);border:2px solid var(--warning);border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer}
    .tip-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:#92400e;font-weight:600;line-height:1.5}
    /* MISTAKE BOOK */
    #mistakeScreen .body{padding:14px;flex:1;overflow-y:auto}
    .mistake-empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .mistake-empty .icon{font-size:56px;margin-bottom:12px}
    .mistake-empty p{font-size:15px}
    .mistake-list{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
    .mi-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
    .mi-item:last-child{border-bottom:none}
    .mi-info{flex:1}
    .mi-en{font-size:16px;font-weight:800;color:var(--text)}
    .mi-cn{font-size:12px;color:var(--muted);margin-top:2px}
    .mi-count{font-size:11px;color:var(--danger);background:#fee2e2;padding:2px 7px;border-radius:100px;flex-shrink:0;font-weight:700}
    .mi-del{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px;flex-shrink:0}
    /* toast */
    .toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1}
    @media(min-width:520px){body{background:#dbeafe}.screen{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh}}
  </style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="hero">
    <div class="hero-icon">🎙️</div>
    <h1>英语听写</h1>
    <p>人教版 PEP · 三~五年级全册<br>单词 · 词组 · 句子，纸笔听写</p>
  </div>
  <div class="home-body">
    <div class="daily-banner" onclick="startDailyPlan()">
      <div class="db-icon">📅</div>
      <div class="db-info">
        <h3>每日计划听写</h3>
        <p id="dailyDesc">每天20题，系统智能出题</p>
      </div>
      <div class="db-arrow">›</div>
    </div>
    <div class="mistake-banner" id="mistakeBanner" style="display:none" onclick="openMistakeBook()">
      <div class="mb-icon">📖</div>
      <div class="mb-info">
        <h3>错词本复习<span class="badge" id="mistakeCntBadge">0</span></h3>
        <p>写错的单词，专项复习练习</p>
      </div>
      <div class="mb-arrow">›</div>
    </div>
    <div class="sec-title">📚 按单元选择</div>
    <div class="tabs">
      <button class="tab-btn on" id="tabAll" onclick="filterGrade('all')">全部</button>
      <button class="tab-btn" id="tab3" onclick="filterGrade('3')">三年级</button>
      <button class="tab-btn" id="tab4" onclick="filterGrade('4')">四年级</button>
      <button class="tab-btn" id="tab5" onclick="filterGrade('5')">五年级</button>
      <button class="tab-btn" id="tab0" onclick="filterGrade('0')">综合</button>
    </div>
    <div class="unit-list" id="unitList"></div>
  </div>
</div>

<!-- SETUP -->
<div id="setupScreen" class="screen">
  <div class="hd">
    <button class="back-btn" onclick="goHome()">←</button>
    <h1 id="setupTitle">Unit</h1>
    <p id="setupSub"></p>
  </div>
  <div class="body">
    <div class="setup-card">
      <h3>朗读方式</h3>
      <div class="pill-row">
        <button class="pill on" id="modeCnEn" onclick="setMode('cn+en')">先中文后英文</button>
        <button class="pill" id="modeCn" onclick="setMode('cn')">只报中文</button>
        <button class="pill" id="modeEn" onclick="setMode('en')">只报英文</button>
      </div>
    </div>
    <div class="setup-card">
      <h3>单词间隔（秒）</h3>
      <div class="range-row">
        <input type="range" id="intervalRange" min="3" max="20" value="7" step="1" oninput="updateInterval(this.value)"/>
        <span class="range-val" id="intervalVal">7</span>秒
      </div>
      <div class="interval-labels"><span>3秒（快）</span><span>20秒（慢）</span></div>
    </div>
    <div class="setup-card">
      <h3>朗读次数</h3>
      <div class="pill-row">
        <button class="pill on" id="repeat1" onclick="setRepeat(1)">读1遍</button>
        <button class="pill" id="repeat2" onclick="setRepeat(2)">读2遍</button>
        <button class="pill" id="repeat3" onclick="setRepeat(3)">读3遍</button>
      </div>
    </div>
    <div class="setup-card">
      <h3>出题数量</h3>
      <div class="range-row">
        <input type="range" id="countRange" min="5" max="30" value="20" step="1" oninput="updateCount(this.value)"/>
        <span class="range-val" id="countVal">20</span>个
      </div>
    </div>
    <div class="setup-card" id="typeFilterCard">
      <h3>出题类型（可多选）</h3>
      <div class="pill-row">
        <button class="pill on" id="typeWord" onclick="toggleType('word')">📝 单词</button>
        <button class="pill on" id="typePhrase" onclick="toggleType('phrase')">🔗 词组</button>
        <button class="pill on" id="typeSentence" onclick="toggleType('sentence')">💬 句子</button>
      </div>
    </div>
    <div class="setup-card">
      <h3>出题顺序</h3>
      <div class="toggle-row">
        <button class="toggle-btn on" id="orderRandom" onclick="setOrder('random')">🔀 随机</button>
        <button class="toggle-btn" id="orderSeq" onclick="setOrder('seq')">📋 按顺序</button>
      </div>
    </div>
    <button class="start-btn" onclick="startDictation()">🎙️ 开始听写</button>
  </div>
</div>

<!-- DICTATION -->
<div id="dictScreen" class="screen">
  <div class="hd">
    <button class="back-btn" onclick="stopDictation()">←</button>
    <h1 id="dictHdTitle">听写中</h1>
    <p id="dictHdSub"></p>
  </div>
  <div class="body">
    <div class="prog-row">
      <span class="prog-text" id="progText">1 / 20</span>
      <span class="prog-text" id="progPct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="display-card">
      <div id="itemTypeBadge" class="item-type-badge type-word">单词</div>
      <div class="word-num" id="wordNum">第 1 题</div>
      <div class="word-cn" id="wordCn">—</div>
      <div class="word-en" id="wordEn"></div>
      <div class="speaking-badge" id="speakingBadge" style="display:none">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span id="speakingLabel">正在朗读</span>
      </div>
    </div>
    <div class="status-line" id="statusLine">准备开始…</div>
    <div class="ctrl-bar">
      <button class="ctrl-btn btn-repeat" onclick="repeatCurrent()"><span class="icon">🔁</span>重复</button>
      <button class="ctrl-btn btn-pause" id="pauseBtn" onclick="togglePause()"><span class="icon" id="pauseIcon">⏸</span><span id="pauseLabel">暂停</span></button>
      <button class="ctrl-btn btn-skip" onclick="skipCurrent()"><span class="icon">⏭</span>跳过</button>
    </div>
    <div class="ctrl-bar" style="grid-template-columns:1fr 1fr;margin-top:-2px">
      <button class="ctrl-btn btn-stop" onclick="stopDictation()"><span class="icon">⏹</span>结束</button>
      <button class="ctrl-btn btn-finish" onclick="finishDictation()"><span class="icon">✅</span>完成·看答案</button>
    </div>
  </div>
</div>

<!-- ANSWER SHEET -->
<div id="answerScreen" class="screen">
  <div class="hd">
    <button class="back-btn" onclick="goHome()">←</button>
    <h1>答案核对</h1>
    <p id="ansSub"></p>
  </div>
  <div class="body">
    <div class="ans-summary">
      <div><div class="ans-num n-blue" id="sumTotal">0</div><div class="ans-lbl">共听写</div></div>
      <div><div class="ans-num n-red" id="sumMarked">0</div><div class="ans-lbl">加入错词本</div></div>
    </div>
    <div class="tip-box">✏️ 核对答案，点 <b style="color:#dc2626">❌</b> 将写错的单词加入错词本，下次专项复习</div>
    <div class="sec-title">📝 对照答案</div>
    <div class="ans-list" id="ansList"></div>
    <div class="bottom-btns">
      <button class="btn-primary" onclick="retryDictation()">🔁 再听写一遍</button>
      <button class="btn-warning" id="practiceMarkedBtn" style="display:none" onclick="practiceMarked()">📖 只练习错词</button>
      <button class="btn-outline" onclick="goHome()">返回首页</button>
    </div>
  </div>
</div>

<!-- MISTAKE BOOK -->
<div id="mistakeScreen" class="screen">
  <div class="hd">
    <button class="back-btn" onclick="goHome()">←</button>
    <h1>错词本</h1>
    <p id="mistakeSub">共 0 个待复习</p>
  </div>
  <div class="body" id="mistakeBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
// 数据库：三~五年级全册 单词/词组/句子
// ═══════════════════════════════════
const UNITS = [
  // 三上
  {id:'3a1',grade:3,title:"三上 Unit1-2",name:"文具·颜色",emoji:"✏️",iconBg:"linear-gradient(135deg,#3b82f6,#60a5fa)",words:[
    {en:"pen",cn:"钢笔",type:"word"},{en:"pencil",cn:"铅笔",type:"word"},{en:"pencil case",cn:"铅笔盒",type:"word"},
    {en:"ruler",cn:"尺子",type:"word"},{en:"eraser",cn:"橡皮",type:"word"},{en:"crayon",cn:"蜡笔",type:"word"},
    {en:"book",cn:"书",type:"word"},{en:"bag",cn:"书包",type:"word"},

// ═══════════════════════════
// STATE
// ═══════════════════════════
let currentUnit = null;
let dictWords   = [];
let dictIndex   = 0;
let sessionLabel = '';
let readMode    = 'cn+en';
let interval    = 7;
let repeatTimes = 1;
let dictCount   = 20;
let dictOrder   = 'random';
let typeFilters = {word:true, phrase:true, sentence:true};
let paused = false, stopped = false, stepTimer = null;
let isDailyMode = false, isMistakeMode = false;

// ═══════════════════════════
// MISTAKE BOOK
// ═══════════════════════════
function getMistakes() {
  try { return JSON.parse(localStorage.getItem('pepMistakes') || '{}'); } catch(e) { return {}; }
}
function saveMistakes(data) { localStorage.setItem('pepMistakes', JSON.stringify(data)); }
function addMistake(word) {
  const m = getMistakes(), key = word.en;
  if (m[key]) { m[key].count = (m[key].count||1)+1; }
  else { m[key] = {en:word.en, cn:word.cn, type:word.type||'word', count:1, addedAt:Date.now()}; }
  saveMistakes(m);
}
function removeMistake(en) { const m=getMistakes(); delete m[en]; saveMistakes(m); }
function getMistakeList() { return Object.values(getMistakes()).sort((a,b)=>b.count-a.count); }
function getMistakeCount() { return Object.keys(getMistakes()).length; }

// ═══════════════════════════
// DAILY PLAN (localStorage progress)
// ═══════════════════════════
function getDailyProgress() {
  try { return JSON.parse(localStorage.getItem('pepDailyProgress') || '{}'); } catch(e) { return {}; }
}
function saveDailyProgress(data) { localStorage.setItem('pepDailyProgress', JSON.stringify(data)); }

// 构建每日单词池：从所有单元按比例抽取，优先混入错词
function buildDailyPool(count) {
  // 收集所有单词（去重）
  const seen = new Set();
  const allWords = [];
  UNITS.forEach(u => u.words.forEach(w => {
    if (!seen.has(w.en)) { seen.add(w.en); allWords.push({...w, unitId:u.id}); }
  }));

  // 错词优先加入
  const mistakes = getMistakeList();
  const mistakeEnSet = new Set(mistakes.map(m=>m.en));
  const mistakeWords = mistakes.map(m=>({...m, _isMistake:true}));

  // 非错词池
  const normalWords = allWords.filter(w=>!mistakeEnSet.has(w.en));
  shuffle(normalWords);

  // 错词最多占一半
  const mistakeSlot = Math.min(Math.floor(count/2), mistakeWords.length);
  const normalSlot  = count - mistakeSlot;

  const pool = [
    ...mistakeWords.slice(0, mistakeSlot),
    ...normalWords.slice(0, normalSlot),
  ];
  shuffle(pool);
  return pool.slice(0, count);
}

// ═══════════════════════════
// INIT HOME
// ═══════════════════════════
(function init(){
  refreshHome();
  if ('speechSynthesis' in window) speechSynthesis.getVoices();
})();

function refreshHome() {
  // mistake banner
  const cnt = getMistakeCount();
  const mb = document.getElementById('mistakeBanner');
  document.getElementById('mistakeCntBadge').textContent = cnt;
  mb.style.display = cnt > 0 ? 'flex' : 'none';

  // daily desc
  const today = new Date().toDateString();
  const prog = getDailyProgress();
  if (prog.date === today && prog.done) {
    document.getElementById('dailyDesc').textContent = `今日已完成 ✅ 明天继续加油！`;
  } else {
    const mistakeCnt = Math.min(getMistakeCount(), 10);
    document.getElementById('dailyDesc').textContent = `今日计划 20 题${mistakeCnt>0?`（含${mistakeCnt}个错词复习）`:''}`;
  }

  // unit list (default: all)
  renderUnitList('all');
}

function filterGrade(g) {
  ['tabAll','tab3','tab4','tab5','tab0'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById(g==='all'?'tabAll':g==='0'?'tab0':'tab'+g).classList.add('on');
  renderUnitList(g);
}

function renderUnitList(grade) {
  const list = document.getElementById('unitList');
  list.innerHTML = '';
  const filtered = grade==='all' ? UNITS : UNITS.filter(u=>String(u.grade)===String(grade));
  filtered.forEach(u => {
    const gTag = u.grade===0?'<span class="grade-tag g0">复习</span>':
                 u.grade===3?'<span class="grade-tag g3">三年级</span>':
                 u.grade===4?'<span class="grade-tag g4">四年级</span>':
                             '<span class="grade-tag g5">五年级</span>';
    const c = document.createElement('div');
    c.className = 'unit-card';
    c.innerHTML = `
      <div class="unit-icon" style="background:${u.iconBg}">${u.emoji}</div>
      <div class="unit-info">
        <h3>${u.title}${gTag}</h3>
        <p>${u.name} · ${u.words.length} 个项目</p>
      </div>
      <span class="unit-arrow">›</span>`;
    c.onclick = () => openSetup(u.id);
    list.appendChild(c);
  });
}

function goHome() { stopAll(); refreshHome(); showScreen('homeScreen'); }

// ═══════════════════════════
// DAILY PLAN
// ═══════════════════════════
function startDailyPlan() {
  isDailyMode   = true;
  isMistakeMode = false;
  currentUnit   = null;
  dictWords     = buildDailyPool(20);
  dictCount     = dictWords.length;
  sessionLabel  = '每日计划';
  document.getElementById('setupTitle').textContent = '每日计划';
  document.getElementById('setupSub').textContent   = `智能出题 · 共${dictCount}题`;
  document.getElementById('countRange').value = dictCount;
  document.getElementById('countVal').textContent = dictCount;
  document.getElementById('countRange').disabled = true;
  document.getElementById('typeFilterCard').style.opacity = '.5';
  showScreen('setupScreen');
}

// ═══════════════════════════
// MISTAKE BOOK SCREEN
// ═══════════════════════════
function openMistakeBook() {
  const list = getMistakeList();
  document.getElementById('mistakeSub').textContent = `共 ${list.length} 个待复习`;
  const body = document.getElementById('mistakeBody');
  body.innerHTML = '';
  if (list.length === 0) {
    body.innerHTML = '<div class="mistake-empty"><div class="icon">🎉</div><p>错词本是空的，继续加油！</p></div>';
  } else {
    const mlist = document.createElement('div');
    mlist.className = 'mistake-list';
    list.forEach(w => {
      const item = document.createElement('div');
      item.className = 'mi-item';
      item.innerHTML = `
        <div class="mi-info">
          <div class="mi-en">${w.en}</div>
          <div class="mi-cn">${w.cn}</div>
        </div>
        <span class="mi-count">错${w.count}次</span>
        <button class="ans-speak" onclick="speakOnce('${w.en.replace(/'/g,"\\'")}')">🔊</button>
        <button class="mi-del" title="从错词本移除" onclick="deleteMistake('${w.en.replace(/'/g,"\\'")}', this)">🗑️</button>`;
      mlist.appendChild(item);
    });
    body.appendChild(mlist);
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.style.cssText = 'width:100%;margin-bottom:24px';
    btn.textContent = '🎙️ 开始错词听写';
    btn.onclick = startMistakeDictation;
    body.appendChild(btn);
  }
  showScreen('mistakeScreen');
}

function deleteMistake(en, btn) {
  removeMistake(en);
  btn.closest('.mi-item').remove();
  const cnt = getMistakeCount();
  document.getElementById('mistakeSub').textContent = `共 ${cnt} 个待复习`;
  if (cnt===0) openMistakeBook();
}

function startMistakeDictation() {
  const list = getMistakeList();
  if (list.length === 0) { showToast('错词本为空'); return; }
  isDailyMode   = false;
  isMistakeMode = true;
  currentUnit   = null;
  dictWords     = list.map(w=>({...w, _isMistake:true}));
  shuffle(dictWords);
  dictCount    = dictWords.length;
  sessionLabel = '错词复习';
  document.getElementById('setupTitle').textContent = '错词本听写';
  document.getElementById('setupSub').textContent   = `共 ${dictCount} 个错词`;
  document.getElementById('countRange').value = dictCount;
  document.getElementById('countVal').textContent = dictCount;
  document.getElementById('countRange').disabled = true;
  document.getElementById('typeFilterCard').style.opacity = '.5';
  showScreen('setupScreen');
}

// ═══════════════════════════
// SETUP
// ═══════════════════════════
function openSetup(unitId) {
  isDailyMode   = false;
  isMistakeMode = false;
  currentUnit   = UNITS.find(u=>u.id===unitId);
  sessionLabel  = currentUnit.title;
  document.getElementById('setupTitle').textContent = currentUnit.title;
  document.getElementById('setupSub').textContent   = currentUnit.name;
  const max = currentUnit.words.length;
  const cr  = document.getElementById('countRange');
  cr.max     = max; cr.value = Math.min(dictCount, max); cr.disabled = false;
  document.getElementById('typeFilterCard').style.opacity = '1';
  updateCount(cr.value);
  showScreen('setupScreen');
}

function setMode(m) {
  readMode = m;
  ['modeCnEn','modeCn','modeEn'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(m==='cn+en'?'modeCnEn':m==='cn'?'modeCn':'modeEn').classList.add('on');
}
function setRepeat(n) {
  repeatTimes = n;
  ['repeat1','repeat2','repeat3'].forEach((id,i)=>document.getElementById(id).classList.toggle('on',i+1===n));
}
function setOrder(o) {
  dictOrder = o;
  document.getElementById('orderRandom').classList.toggle('on',o==='random');
  document.getElementById('orderSeq').classList.toggle('on',o==='seq');
}
function updateInterval(v) { interval=parseInt(v); document.getElementById('intervalVal').textContent=v; }
function updateCount(v)    { dictCount=parseInt(v); document.getElementById('countVal').textContent=v; }
function toggleType(t) {
  typeFilters[t] = !typeFilters[t];
  document.getElementById('type'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('on', typeFilters[t]);
}

// ═══════════════════════════
// START DICTATION
// ═══════════════════════════
function startDictation() {
  if (isDailyMode || isMistakeMode) {
    // pool already built
  } else {
    let pool = [...currentUnit.words].filter(w=>typeFilters[w.type]||!w.type);
    if (pool.length===0) { showToast('没有符合条件的单词'); return; }
    if (dictOrder==='random') shuffle(pool);
    dictWords = pool.slice(0, dictCount);
  }
  dictIndex = 0; paused = false; stopped = false;
  document.getElementById('dictHdTitle').textContent = sessionLabel || '听写';
  document.getElementById('dictHdSub').textContent   = `共 ${dictWords.length} 题`;
  document.getElementById('ansSub').textContent      = sessionLabel || '听写';
  setPauseUI(false);
  showScreen('dictScreen');
  runWord();
}

// ═══════════════════════════
// CORE: run one word
// ═══════════════════════════
async function runWord() {
  if (stopped) return;
  if (dictIndex >= dictWords.length) { finishDictation(); return; }

  const w = dictWords[dictIndex];
  const total = dictWords.length;
  document.getElementById('progText').textContent = `${dictIndex+1} / ${total}`;
  document.getElementById('progPct').textContent  = Math.round(dictIndex/total*100)+'%';
  document.getElementById('progFill').style.width = (dictIndex/total*100)+'%';
  document.getElementById('wordNum').textContent  = `第 ${dictIndex+1} 题`;
  document.getElementById('wordCn').textContent   = w.cn;
  document.getElementById('wordEn').textContent   = '';

  // type badge
  const badge = document.getElementById('itemTypeBadge');
  if (w._isMistake) { badge.className='item-type-badge type-mistake'; badge.textContent='错词复习'; }
  else if (w.type==='sentence') { badge.className='item-type-badge type-sentence'; badge.textContent='句子'; }
  else if (w.type==='phrase')   { badge.className='item-type-badge type-phrase';   badge.textContent='词组'; }
  else                          { badge.className='item-type-badge type-word';     badge.textContent='单词'; }

  setStatus('正在朗读…');
  showBadge(true,'正在朗读');

  for (let r=0; r<repeatTimes; r++) {
    if (stopped) return;
    await waitIfPaused();
    if (stopped) return;
    if (readMode==='cn+en'||readMode==='cn') {
      setStatus(`第${r+1}遍：朗读中文`); showBadge(true,'朗读中文');
      await speakAsync(w.cn,'zh-CN');
      if (stopped) return;
      await sleep(400);
    }
    if (readMode==='cn+en'||readMode==='en') {
      if (stopped) return;
      await waitIfPaused();
      setStatus(`第${r+1}遍：朗读英文`); showBadge(true,'朗读英文');
      await speakAsync(w.en,'en-US');
      if (stopped) return;
      await sleep(300);
    }
    if (r<repeatTimes-1) await sleep(600);
  }

  showBadge(false);
  await countdown(interval);
  if (stopped) return;
  dictIndex++;
  runWord();
}

// ═══════════════════════════
// COUNTDOWN
// ═══════════════════════════
function countdown(secs) {
  return new Promise(resolve => {
    let left = secs;
    const enEl = document.getElementById('wordEn');
    function tick() {
      if (stopped) { enEl.textContent=''; resolve(); return; }
      if (paused)  { enEl.textContent='已暂停'; stepTimer=setTimeout(tick,200); return; }
      if (left<=0) { enEl.textContent=''; resolve(); return; }
      enEl.textContent = `${left} 秒后读下一个`;
      left--;
      stepTimer = setTimeout(tick,1000);
    }
    tick();
  });
}

// ═══════════════════════════
// PAUSE / SKIP / STOP
// ═══════════════════════════
function togglePause() {
  paused = !paused; setPauseUI(paused);
  if (paused) { speechSynthesis.pause(); setStatus('已暂停，点击继续'); showBadge(false); }
  else        { speechSynthesis.resume(); setStatus('继续中…'); }
}
function setPauseUI(p) {
  document.getElementById('pauseIcon').textContent  = p?'▶':'⏸';
  document.getElementById('pauseLabel').textContent = p?'继续':'暂停';
}
function waitIfPaused() {
  return new Promise(resolve => {
    function check() { if(stopped||!paused){resolve();}else{setTimeout(check,200);} }
    check();
  });
}
function repeatCurrent() { if(paused){paused=false;setPauseUI(false);} stopAll(); stopped=false; runWord(); showToast('🔁 重复当前'); }
function skipCurrent()   { stopAll(); stopped=false; dictIndex++; if(dictIndex>=dictWords.length){finishDictation();return;} showToast('⏭ 跳过'); runWord(); }
function stopDictation() { stopAll(); showScreen('setupScreen'); }
function stopAll() {
  stopped=true; paused=false; clearTimeout(stepTimer);
  if('speechSynthesis' in window) speechSynthesis.cancel();
  showBadge(false);
}

// ═══════════════════════════
// FINISH → ANSWER SHEET
// ═══════════════════════════
function finishDictation() {
  stopAll();
  // mark daily done
  if (isDailyMode) {
    const prog = getDailyProgress();
    prog.date = new Date().toDateString(); prog.done = true;
    saveDailyProgress(prog);
  }
  buildAnswerSheet();
  showScreen('answerScreen');
}

let markedMistakes = new Set();

function buildAnswerSheet() {
  markedMistakes.clear();
  document.getElementById('sumTotal').textContent   = dictWords.length;
  document.getElementById('sumMarked').textContent  = 0;
  document.getElementById('practiceMarkedBtn').style.display = 'none';

  const list = document.getElementById('ansList');
  list.innerHTML = '';
  dictWords.forEach((w,i) => {
    const item = document.createElement('div');
    item.className = 'ans-item';
    item.innerHTML = `
      <div class="ans-n">${i+1}</div>
      <div style="flex:1">
        <div class="ans-cn">${w.cn}</div>
        <div class="ans-en">${w.en}</div>
      </div>
      <button class="ans-speak" onclick="speakOnce('${w.en.replace(/'/g,"\\'")}')">🔊</button>
      <button class="mark-btn" id="markBtn_${i}" onclick="toggleMistakeMark(${i})">❌</button>`;
    list.appendChild(item);
  });
}

function toggleMistakeMark(i) {
  const w   = dictWords[i];
  const btn = document.getElementById('markBtn_'+i);
  if (markedMistakes.has(i)) {
    markedMistakes.delete(i);
    btn.classList.remove('marked');
    btn.textContent = '❌';
    removeMistake(w.en);
  } else {
    markedMistakes.add(i);
    btn.classList.add('marked');
    btn.textContent = '✓';
    addMistake(w);
  }
  document.getElementById('sumMarked').textContent = markedMistakes.size;
  document.getElementById('practiceMarkedBtn').style.display = markedMistakes.size>0?'':'none';
}

function retryDictation()  { dictIndex=0; paused=false; stopped=false; if(dictOrder==='random')shuffle(dictWords); setPauseUI(false); showScreen('dictScreen'); runWord(); }
function practiceMarked()  {
  const marked = [...markedMistakes].map(i=>dictWords[i]);
  if (marked.length===0) return;
  dictWords = marked; dictIndex=0; paused=false; stopped=false;
  setPauseUI(false); showScreen('dictScreen'); runWord();
}

// ═══════════════════════════
// SPEECH
// ═══════════════════════════
function speakAsync(text, lang) {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang  = lang; u.rate  = lang.startsWith('zh')?0.88:0.78; u.pitch = 1;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(x=>x.lang.startsWith(lang.startsWith('zh')?'zh':'en')&&x.localService)
           || voices.find(x=>x.lang.startsWith(lang.startsWith('zh')?'zh':'en'));
    if (v) u.voice = v;
    u.onend=resolve; u.onerror=resolve;
    speechSynthesis.speak(u);
  });
}
function speakOnce(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.78;
  speechSynthesis.speak(u);
}
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════
// UI HELPERS
// ═══════════════════════════
function setStatus(msg) { document.getElementById('statusLine').textContent=msg; }
function showBadge(show,label) {
  const el=document.getElementById('speakingBadge'); el.style.display=show?'inline-flex':'none';
  if(label) document.getElementById('speakingLabel').textContent=label;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} }
if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
</script>
